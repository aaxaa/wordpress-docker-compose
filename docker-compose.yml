services:
  wp:
    image: wordpress:latest
    container_name: wp
    restart: always
    ports:
      - 8000:80 # change ip if required
    volumes:
      # - $PWD/wp/plugin-name/:/var/www/html/wp-content/plugins/plugin-name
      # - $PWD/wp/theme-name/:/var/www/html/wp-content/themes/theme-name
      - $PWD/config/wp_php.ini:/usr/local/etc/php/conf.d/conf.ini
      - wp_data:/var/www/html
      
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME_FILE: /run/secrets/db_mysql_name
      WORDPRESS_DB_USER_FILE: /run/secrets/db_mysql_user
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_mysql_password

    secrets:
      - db_mysql_name
      - db_mysql_user
      - db_mysql_password

    depends_on:
      - db
    links:
      - db

  wpcli:
    image: wordpress:cli
    container_name: wpcli
    volumes:
      - $PWD/config/wp_php.ini:/usr/local/etc/php/conf.d/conf.ini
      - wp_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME_FILE: /run/secrets/db_mysql_name
      WORDPRESS_DB_USER_FILE: /run/secrets/db_mysql_user
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_mysql_password

    secrets:
      - db_mysql_name
      - db_mysql_user
      - db_mysql_password

    depends_on:
      - db
      - wp

  pma:
    image: phpmyadmin:latest  # https://hub.docker.com/_/phpmyadmin
    container_name: pma
    ports:
      - 8010:80
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: db
      PMA_USER_FILE: /run/secrets/db_mysql_user
      PMA_PASSWORD_FILE: /run/secrets/db_mysql_password

    secrets:
      - db_mysql_user
      - db_mysql_password

    links:
      - db:db
    volumes:
     - $PWD/config/pma_php.ini:/usr/local/etc/php/conf.d/conf.ini
     - $PWD/config/pma_config.php:/etc/phpmyadmin/config.user.inc.php

  db:
    image: mysql:8
    restart: always
    container_name: mysql
    ports:
      - 3306:3306
    command: [
        # '--default_authentication_plugin=mysql_native_password',
        '--character-set-server=utf8mb4',
        '--collation-server=utf8mb4_unicode_ci'
    ]

    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE_FILE: /run/secrets/db_mysql_name
      MYSQL_USER_FILE: /run/secrets/db_mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_mysql_password
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'

    secrets:
      - db_mysql_name
      - db_mysql_user
      - db_mysql_password

secrets:
  db_mysql_name:
    file: $PWD/config/secrets/db_mysql_name
  db_mysql_user:
    file: $PWD/config/secrets/db_mysql_user
  db_mysql_password:
    file: $PWD/config/secrets/db_mysql_password

volumes:
  wp_data:
  db_data:
